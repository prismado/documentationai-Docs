openapi: 3.0.0
info:
  title: Auctionline Upload API
  version: 1.0.0

servers:
  - url: https://serviced.auctionline.ch

paths:
  /api/upload:
    post:
      summary: Upload inventory CSV
      operationId: uploadInventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - POSTDATA
                - file
              properties:
                POSTDATA:
                  type: string
                  description: JSON payload
                file:
                  type: string
                  format: binary
            encoding:
              POSTDATA:
                contentType: application/json
      responses:
        "200":
          description: Upload successful

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT