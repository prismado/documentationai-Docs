openapi: 3.0.0
info:
  title: Auctionline Upload API
  version: 1.0.0

servers:
  - url: https://serviced.auctionline.ch/api

paths:
  /upload-data:
    post:
      summary: /upload-data
      description: Hochladen von Inventar- oder PKID-Daten.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ssp_order_id
                - u_type
                - file
              properties:
                ssp_order_id:
                  type: integer
                  example: 379
                u_type:
                  type: string
                  example: INV
                  description: INV oder PKID
                file:
                  type: string
                  format: byte
                  description: Base64-kodierter Dateiinhalt
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultCode:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: Upload-Type PKID SSP-Order-ID 543
                  data:
                    type: object
                    properties:
                      filename:
                        type: string
                        example: imp_u56-030-811-410.csv
                      importID:
                        type: integer
                        example: 1410
        "400":
          description: Invalid request
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer