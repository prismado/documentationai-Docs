openapi: 3.0.0
info:
  title: Auctionline Upload API
  version: 1.0.0

servers:
  - url: https://service-t.auctionline.ch/api

paths:
  /upload:
    post:
      summary: Upload inventory data
      operationId: uploadInventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - POSTDATA
                - file
              properties:
                POSTDATA:
                  type: string
                  description: JSON metadata payload
                  example: '{"ssp_order_id":635,"u_type":"INV"}'
                file:
                  type: string
                  format: binary
                  description: CSV file to upload
            encoding:
              POSTDATA:
                contentType: application/json
      responses:
        "200":
          description: Upload successful
        "400":
          description: Invalid request
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer