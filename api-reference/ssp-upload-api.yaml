openapi: 3.0.0
info:
  title: Auctionline Upload API
  version: 1.0.0
servers:
  - url: https://service.auctionline.ch/api

paths:
  /upload-data:
    post:
      summary: Upload inventory data
      description: Uploads inventory data as a CSV file together with metadata.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - POSTDATA
                - file
              properties:
                POSTDATA:
                  type: object
                  description: JSON metadata payload
                  properties:
                    ssp_order_id:
                      type: integer
                      example: 379
                    u_type:
                      type: string
                      example: INV
                file:
                  type: string
                  format: binary
                  description: CSV file containing inventory data
            encoding:
              POSTDATA:
                contentType: application/json
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultCode:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: Upload-Type PKID SSP-Order-ID 543
                  data:
                    type: object
                    properties:
                      filename:
                        type: string
                        example: imp_u56-030-811-410.csv
                      immportID:
                        type: integer
                        example: 1410
        "400":
          description: Invalid request
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT